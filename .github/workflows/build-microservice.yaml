on:
  workflow_call:
    inputs:
      project-name:
        required: true
        type: string
      microservice-name:
        required: true
        type: string
      environment:
        required: true
        type: string
      runner:
        required: false
        type: string
        default: ubuntu-latest

  workflow_dispatch:

env:
  IS_RELEASE: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}
  IS_RC: ${{ github.ref == 'refs/heads/rc' }}
  IS_BETA: ${{ github.ref == 'refs/heads/dev' }}
  
permissions:
  contents: write
  packages: write
  repository-projects: write

jobs:
  build:
    name: Build .Net
    environment: ${{ inputs.environment }}
    runs-on: ${{ inputs.runner }}
    
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup .NET SDK 🚧
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Dependencies
        env:
          NUGET_PACKAGES_USER: ${{ github.actor }}
          NUGET_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet restore 

      - name: Build
        run: dotnet build --configuration Release
